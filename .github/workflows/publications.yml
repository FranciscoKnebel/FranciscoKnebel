name: Update Publications

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-scholar.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-scholar.txt

      - name: Scrape Google Scholar
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scripts/scrape-scholar.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/publications.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Publications updated:"
            git diff --stat src/data/publications.json
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.json
          git commit -m "Update publications from Google Scholar"
          git push
